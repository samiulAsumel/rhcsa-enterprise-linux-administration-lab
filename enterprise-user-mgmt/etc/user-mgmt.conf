#!/usr/bin/env bash
# Enterprise User Management Configuration
# Version: 2.2.0 - Industry Standard Compliant
# Compliance: CIS Benchmarks, NIST 800-53

# User settings
default_shell="/bin/bash"
home_base="/home"

# Password policy (in days) - CIS compliant
password_max_days=90
password_min_days=1
password_warn_days=7
inactive_days=30

# System paths
sudoers_dir="/etc/sudoers.d"

# Enterprise security settings
audit_log="/var/log/user-mgmt-audit.log"
backup_dir="/var/backups/user-mgmt"
max_login_attempts=5
lockout_duration=900
session_timeout=3600

# Password complexity settings
min_password_length=12
max_password_length=128
password_complexity_required=true

# Additional security settings
# Uncomment to enforce home directory permissions
# home_umask=027

# Uncomment to set custom skeleton directory
# skeleton_dir="/etc/custom-skel"

# SSH security settings
# ssh_key_min_bits=2048
# ssh_allowed_algorithms="rsa,ecdsa,ed25519"